# Viral Post Patterns - OpenClaw Skill

name: viral-post-patterns
version: 1.0.0
description: SNSでバズる投稿の15の型を生成するスキル
author: AirCle
license: MIT

entry:
  command: generate
  script: ./generate.js

commands:
  generate:
    description: バズ投稿パターンを使用して投稿を生成
    args:
      - name: pattern
        type: string
        description: 使用するパターンID（01-breaking-newsなど）
        required: false
      - name: theme
        type: string
        description: 投稿テーマ
        required: false
      - name: platform
        type: string
        description: 対象プラットフォーム
        default: x-twitter
        options: [x-twitter, instagram, linkedin, note]
      - name: interactive
        type: boolean
        description: 対話式モード
        default: false

  list:
    description: 利用可能なパターンを一覧表示
    script: ./list-patterns.js

  analyze:
    description: 既存の投稿を分析して最適なパターンを提案
    args:
      - name: text
        type: string
        description: 分析する投稿テキスト
        required: true

defaults:
  platform: x-twitter
  language: ja
  max_length: 280
  tone: professional

patterns_path: ../patterns/patterns.json
prompts_path: ../prompts/

platforms:
  x-twitter:
    max_length: 280
    features: [threads, media, hashtags]
    emoji_limit: 3
    
  instagram:
    max_length: 2200
    features: [carousel, stories, reels]
    emoji_limit: 10
    
  linkedin:
    max_length: 3000
    features: [articles, documents, polls]
    emoji_limit: 5
    
  note:
    max_length: 10000
    features: [images, embeds]
    emoji_limit: no_limit
