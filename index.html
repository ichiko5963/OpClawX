<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Post Automation</title>
<style>
  :root {
    --bg: #0f1117; --panel: #1a1d27; --border: #2d3148;
    --accent: #5865f2; --accent2: #57f287; --text: #e2e8f0;
    --text2: #94a3b8; --warn: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  
  .header {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 16px 24px; display: flex; align-items: center; gap: 12px;
  }
  .header h1 { font-size: 1.1rem; font-weight: 700; }
  .badge {
    background: var(--accent); color: #fff; font-size: 0.6rem;
    padding: 2px 6px; border-radius: 4px; font-weight: 600; letter-spacing: .5px;
  }
  .lang-select {
    margin-left: auto; background: var(--border); color: var(--text);
    border: none; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 0.85rem;
  }

  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px; display: grid; gap: 20px; }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
  }
  .card h2 { font-size: 0.95rem; font-weight: 600; margin-bottom: 14px; color: var(--text2); }
  
  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 8px; padding: 32px;
    text-align: center; cursor: pointer; transition: all .2s;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(88,101,242,.08); }
  .upload-zone .icon { font-size: 2rem; margin-bottom: 8px; }
  .upload-zone p { color: var(--text2); font-size: 0.85rem; }
  #fileInput { display: none; }

  /* Pattern grid */
  .pattern-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px;
  }
  .pattern-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; cursor: pointer; transition: all .15s;
  }
  .pattern-card:hover { border-color: var(--accent); }
  .pattern-card.selected { border-color: var(--accent); background: rgba(88,101,242,.12); }
  .pattern-card .num { font-size: 0.65rem; color: var(--text2); }
  .pattern-card .name { font-size: 0.85rem; font-weight: 600; margin-top: 2px; }
  .pattern-card .mult { font-size: 0.7rem; color: var(--accent2); margin-top: 4px; }

  /* Form controls */
  input, select, textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 0.9rem;
    outline: none; transition: border-color .2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  label { font-size: 0.8rem; color: var(--text2); margin-bottom: 6px; display: block; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  
  button {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: opacity .2s; width: 100%; margin-top: 12px;
  }
  button:hover { opacity: .85; }
  button.secondary { background: var(--border); }

  /* Result box */
  .result-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap;
    max-height: 300px; overflow-y: auto; display: none;
  }
  .result-box.visible { display: block; }
  .result-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .chip {
    background: var(--border); border-radius: 20px; padding: 4px 10px;
    font-size: 0.75rem; color: var(--text2);
  }
  .chip.green { background: rgba(87,242,135,.15); color: var(--accent2); }
  .chip.blue  { background: rgba(88,101,242,.15); color: var(--accent); }

  /* Analysis results */
  .pattern-rank { margin-top: 8px; }
  .rank-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .rank-item:last-child { border-bottom: none; }
  .rank-num { font-size: 0.7rem; color: var(--text2); width: 20px; text-align: right; }
  .rank-bar-wrap { flex: 1; }
  .rank-name { font-size: 0.85rem; font-weight: 600; }
  .rank-bar {
    height: 4px; border-radius: 2px; background: var(--accent);
    margin-top: 4px; transition: width .5s;
  }
  .rank-eng { font-size: 0.75rem; color: var(--accent2); width: 60px; text-align: right; }

  /* Schedule */
  .schedule-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .schedule-row input, .schedule-row select { margin: 0; }
  .schedule-item {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
  }
  .schedule-item .del { background: none; color: #ef4444; width: auto; margin: 0; padding: 4px 8px; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--accent2);
    color: #000; padding: 10px 18px; border-radius: 8px; font-weight: 600;
    font-size: 0.85rem; opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <span style="font-size:1.4rem">🚀</span>
  <h1>Viral Post Automation</h1>
  <span class="badge">v2.0</span>
  <select class="lang-select" id="langSwitch" onchange="switchLang(this.value)">
    <option value="en">🇺🇸 EN</option>
    <option value="ja">🇯🇵 JP</option>
    <option value="cn">🇨🇳 CN</option>
    <option value="ko">🇰🇷 KR</option>
    <option value="es">🇪🇸 ES</option>
  </select>
</div>

<div class="main">

  <!-- Step 1: Upload -->
  <div class="card">
    <h2 id="step1Title">① Analyze Your Data</h2>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📊</div>
      <p id="uploadText">Drag &amp; drop your CSV here, or click to browse</p>
      <p style="font-size:.75rem;margin-top:6px;color:#475569">Format: text, likes, retweets, replies, date</p>
      <input type="file" id="fileInput" accept=".csv,.json" onchange="handleFile(this)">
    </div>
    <div id="analysisResults" class="pattern-rank" style="display:none;margin-top:14px"></div>
  </div>

  <!-- Step 2: Generate -->
  <div class="card">
    <h2 id="step2Title">② Generate Post</h2>
    <div style="margin-bottom:12px">
      <label id="selectPatternLabel">Select Pattern</label>
      <div class="pattern-grid" id="patternGrid"></div>
    </div>
    <div class="row">
      <div>
        <label id="topicLabel">Topic</label>
        <input type="text" id="topicInput" placeholder="e.g. AI new feature, ChatGPT update…">
      </div>
      <div>
        <label id="langLabel">Language</label>
        <select id="langSelect">
          <option value="en">🇺🇸 English</option>
          <option value="ja">🇯🇵 日本語</option>
          <option value="cn">🇨🇳 中文</option>
          <option value="ko">🇰🇷 한국어</option>
          <option value="es">🇪🇸 Español</option>
        </select>
      </div>
    </div>
    <button id="generateBtn" onclick="generatePost()">✨ Generate Post</button>

    <div id="resultBox" class="result-box" style="margin-top:14px"></div>
    <div id="resultMeta" class="result-meta" style="display:none"></div>
    <button id="copyBtn" class="secondary" onclick="copyPrompt()" style="display:none">📋 Copy Prompt</button>
  </div>

  <!-- Step 3: Schedule -->
  <div class="card">
    <h2 id="step3Title">③ Daily Delivery</h2>
    <div class="row">
      <div>
        <label>Delivery Time</label>
        <input type="time" id="schedTime" value="07:00">
      </div>
      <div>
        <label>Webhook URL (Discord/Slack)</label>
        <input type="url" id="schedWebhook" placeholder="https://discord.com/api/webhooks/…">
      </div>
    </div>
    <div class="row" style="margin-top:10px">
      <div>
        <label>Topic</label>
        <input type="text" id="schedTopic" placeholder="Daily AI News">
      </div>
      <div>
        <label>Language</label>
        <select id="schedLang">
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="cn">中文</option>
          <option value="ko">한국어</option>
          <option value="es">Español</option>
        </select>
      </div>
    </div>
    <button onclick="saveSchedule()">💾 Save Schedule</button>
    <div id="schedList" style="margin-top:14px"></div>
  </div>

</div>

<div id="toast">Copied!</div>

<script>

    topPatterns:'Mejores Patrones', avgEng:'EG promedio',
    patterns: {
      '01-breaking-news':'Noticia Urgente','02-save-for-later':'Guardar Después',

      '13-storytelling':'Narrativa','14-complete-guide':'Guía Completa',

const PATTERNS_META = [
  {id:'01-breaking-news',   w:1.8},
  {id:'02-save-for-later',  w:2.5},
  {id:'03-global-trend',    w:1.5},
  {id:'04-conclusion-first',w:2.0},
  {id:'05-honest-opinion',  w:1.4},
  {id:'06-vs-battle',       w:1.5},
  {id:'07-first-impression',w:1.3},
  {id:'08-by-numbers',      w:1.6},
  {id:'09-insight',         w:1.5},
  {id:'10-freebie',         w:3.0},
  {id:'11-pro-tips',        w:1.4},
  {id:'12-warning',         w:1.7},
  {id:'13-storytelling',    w:1.2},
  {id:'14-complete-guide',  w:1.8},
  {id:'15-future-forecast', w:1.4}
];

// ─── State ────────────────────────────────────────────────────────────────

let currentLang    = 'en';
let selectedPattern= '04-conclusion-first';
let lastPrompt     = '';
let schedules      = JSON.parse(localStorage.getItem('vpa_schedules') || '[]');

// ─── Init ─────────────────────────────────────────────────────────────────

window.onload = () => {
  buildPatternGrid();
  renderSchedules();
};

function switchLang(lang) {
  currentLang = lang;
  document.getElementById('langSwitch').value = lang;
  document.getElementById('langSelect').value  = lang;
  document.getElementById('schedLang').value   = lang;
  const s = I18N[lang] || I18N.en;
  document.getElementById('step1Title').textContent       = s.step1;
  document.getElementById('step2Title').textContent       = s.step2;
  document.getElementById('step3Title').textContent       = s.step3;
  document.getElementById('uploadText').textContent       = s.upload;
  document.getElementById('selectPatternLabel').textContent= s.selectPattern;
  document.getElementById('topicLabel').textContent       = s.topic;
  document.getElementById('langLabel').textContent        = s.lang;
  document.getElementById('generateBtn').textContent      = s.generateBtn;
  document.getElementById('copyBtn').textContent          = s.copyBtn;
  buildPatternGrid();
}

function buildPatternGrid() {
  const s   = I18N[currentLang] || I18N.en;
  const grid = document.getElementById('patternGrid');
  grid.innerHTML = PATTERNS_META.map(p => `
    <div class="pattern-card ${p.id === selectedPattern ? 'selected' : ''}"
         onclick="selectPattern('${p.id}')" id="pc_${p.id}">
      <div class="num">${p.id}</div>
      <div class="name">${s.patterns[p.id]}</div>
      <div class="mult">${p.w}x</div>
    </div>`).join('');
}

function selectPattern(id) {
  selectedPattern = id;
  document.querySelectorAll('.pattern-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('pc_' + id)?.classList.add('selected');
}

// ─── File upload ──────────────────────────────────────────────────────────

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('uploadText').textContent = `📄 ${file.name} — analyzing…`;
  const reader = new FileReader();
  reader.onload = (e) => analyzeCSV(e.target.result);
  reader.readAsText(file);
}

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) { const r = new FileReader(); r.onload = ev => analyzeCSV(ev.target.result); r.readAsText(file); }
});

function analyzeCSV(raw) {
  try {
    const lines   = raw.trim().split('\n').filter(Boolean);
    const headers = lines[0].toLowerCase().split(',').map(h => h.trim().replace(/"/g,''));
    const posts   = lines.slice(1).map(line => {
      const vals = line.split(',').map(v => v.trim().replace(/^"|"$/g,''));
      const obj  = {};
      headers.forEach((h, i) => {
        obj[h] = ['likes','retweets','replies','shares','bookmarks'].includes(h)
          ? (parseInt(vals[i]) || 0) : (vals[i] || '');
      });
      return obj;
    }).filter(p => p.text);

    const patternCounts = {};
    posts.forEach(p => {
      PATTERNS_META.forEach(pm => {
        const indicators = getIndicators(pm.id);
        if (indicators.some(ind => (p.text||'').toLowerCase().includes(ind.toLowerCase()))) {
          const eng = (p.likes||0) + (p.retweets||0)*2 + (p.replies||0)*3;
          if (!patternCounts[pm.id]) patternCounts[pm.id] = { count:0, totalEng:0 };
          patternCounts[pm.id].count++;
          patternCounts[pm.id].totalEng += eng;
        }
      });
    });

    const ranked = Object.entries(patternCounts)
      .map(([id, s]) => ({ id, avgEng: Math.round(s.totalEng / s.count), count: s.count }))
      .sort((a,b) => b.avgEng - a.avgEng);

    showAnalysis(ranked, posts.length);
    document.getElementById('uploadText').textContent = `✅ ${posts.length} posts analyzed`;
  } catch(err) {
    document.getElementById('uploadText').textContent = '❌ Parse error — check CSV format';
  }
}

function getIndicators(id) {
  const map = {
    '01-breaking-news':   ['速報','ついに','Breaking','Finally'],
    '02-save-for-later':  ['保存版','📌','Save','Bookmark'],
    '03-global-trend':    ['海外で話題','Trending','🌎'],
    '04-conclusion-first':['結論','Conclusion','TL;DR'],
    '05-honest-opinion':  ['正直','Honestly'],
    '06-vs-battle':       [' vs ',' VS ','⚔️'],
    '07-first-impression':['使ってみた','Tried'],
    '08-by-numbers':      ['📊','倍','%'],
    '09-insight':         ['実は','Actually'],
    '10-freebie':         ['配布','🎁','Free'],
    '11-pro-tips':        ['裏技','💎','Tips'],
    '12-warning':         ['注意','⚠️','Warning'],
    '13-storytelling':    ['だった','Journey'],
    '14-complete-guide':  ['完全','Complete'],
    '15-future-forecast': ['年後','Future','予測']
  };
  return map[id] || [];
}

function showAnalysis(ranked, total) {
  if (!ranked.length) return;
  const s   = I18N[currentLang] || I18N.en;
  const top = ranked[0];
  const max = top.avgEng || 1;
  const el  = document.getElementById('analysisResults');
  el.style.display = 'block';
  el.innerHTML = `
    <div style="font-size:.8rem;color:var(--text2);margin-bottom:10px">${s.topPatterns} (${total} posts)</div>
    ${ranked.slice(0,6).map((p,i) => `
      <div class="rank-item">
        <div class="rank-num">${i+1}</div>
        <div class="rank-bar-wrap">
          <div class="rank-name">${s.patterns[p.id]}</div>
          <div class="rank-bar" style="width:${Math.round(p.avgEng/max*100)}%"></div>
        </div>
        <div class="rank-eng">${s.avgEng}: ${p.avgEng}</div>
      </div>`).join('')}`;
  selectPattern(top.id);
}

// ─── Generate ─────────────────────────────────────────────────────────────

function generatePost() {
  const topic = document.getElementById('topicInput').value.trim();
  const lang  = document.getElementById('langSelect').value;
  if (!topic) { document.getElementById('topicInput').focus(); return; }

  const uid    = btoa(`${selectedPattern}:${topic}:${Date.now()}`).slice(0,10);
  const prompt = buildPrompt(selectedPattern, topic, lang);
  lastPrompt   = prompt;

  const box  = document.getElementById('resultBox');
  box.textContent = prompt;
  box.classList.add('visible');

  const meta = document.getElementById('resultMeta');
  const s    = I18N[lang] || I18N.en;
  meta.style.display = 'flex';
  meta.innerHTML = `
    <span class="chip blue">${s.patterns[selectedPattern]}</span>
    <span class="chip">${prompt.length} chars</span>
    <span class="chip green">URL: vpa.opclaw.app/p/${uid}</span>`;

  document.getElementById('copyBtn').style.display = 'block';
}

function buildPrompt(patternId, topic, lang) {
  const templates = {
    '01-breaking-news': {
      en: `Generate a Breaking News style X/Twitter post about: "${topic}"\n- Start with 【Breaking】or 🔥\n- Use "finally" / "just launched"\n- 3 bullet points (key features)\n- End with 👇 CTA\n- Max 280 chars, only 🔥 and 👇 emojis\nOutput ONLY the post text.`,
      ja: `以下のトピックで【速報型】のX投稿を作成: "${topic}"\n- 【速報】から始める\n- 「ついに」「登場」を使う\n- 核心ポイントを3つ（・で箇条書き）\n- 👇と🔥のみ使用\n- 280文字以内\n投稿テキストのみ出力。`
    },
    '02-save-for-later': {
      en: `Generate a Save for Later style X post about: "${topic}"\n- Start with 【Save This】\n- 3-5 actionable steps (・ bullets)\n- Use 📌 and 👇 only\n- Max 280 chars\nOutput ONLY the post text.`,
      ja: `以下のトピックで【保存版型】のX投稿を作成: "${topic}"\n- 【保存版】から始める\n- 実践的なステップを3〜5個（・で）\n- 📌と👇のみ使用\n- 280文字以内\n投稿テキストのみ出力。`
    },
    '04-conclusion-first': {
      en: `Generate a Conclusion First style X post about: "${topic}"\n- State the CONCLUSION first\n- Give 3 short reasons (・ bullets)\n- 💡 and 👇 only\n- Max 280 chars\nOutput ONLY the post text.`,
      ja: `以下のトピックで【結論型】のX投稿を作成: "${topic}"\n- 【結論】から始める\n- 理由を3つ箇条書き（・で）\n- 💡と👇のみ使用\n- 280文字以内\n投稿テキストのみ出力。`
    },
    '10-freebie': {
      en: `Generate a Free Resource giveaway X post about: "${topic}"\n- Start with 【Free】\n- Include "want it?"\n- 3 content items (・ bullets)\n- Clear CTA (follow+RT/DM)\n- 🎁 and 👇 only\n- Max 280 chars\nOutput ONLY the post text.`,
      ja: `以下のリソースで【配布型】のX投稿を作成: "${topic}"\n- 【配布】から始める\n- 「欲しい人いますか？」を入れる\n- 中身を3つ（・で）\n- 入手方法を明確に\n- 🎁と👇のみ使用\n- 280文字以内\n投稿テキストのみ出力。`
    }
  };

  const generic = {
    en: `Generate a viral X/Twitter post about: "${topic}"\nPattern: ${patternId}\nMax 280 chars. Only 1-2 relevant emojis.\nOutput ONLY the post text.`,
    ja: `"${topic}"についてX投稿を作成。パターン:${patternId}\n280文字以内。絵文字は1〜2個のみ。\n投稿テキストのみ出力。`
  };

  const tmpl = templates[patternId] || generic;
  return (tmpl[lang] || tmpl.en || generic.en);
}

function copyPrompt() {
  navigator.clipboard.writeText(lastPrompt).then(() => {
    const s = I18N[currentLang] || I18N.en;
    const t = document.getElementById('toast');
    t.textContent = s.copied;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

// ─── Schedule ─────────────────────────────────────────────────────────────

function saveSchedule() {
  const time    = document.getElementById('schedTime').value;
  const webhook = document.getElementById('schedWebhook').value.trim();
  const topic   = document.getElementById('schedTopic').value.trim() || 'Daily AI News';
  const lang    = document.getElementById('schedLang').value;
  schedules.push({ id: `s_${Date.now()}`, time, webhook, topic, lang, enabled: true });
  localStorage.setItem('vpa_schedules', JSON.stringify(schedules));
  renderSchedules();
  const t = document.getElementById('toast');
  t.textContent = '✅ Schedule saved!';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function deleteSchedule(id) {
  schedules = schedules.filter(s => s.id !== id);
  localStorage.setItem('vpa_schedules', JSON.stringify(schedules));
  renderSchedules();
}

function renderSchedules() {
  const el = document.getElementById('schedList');
  if (!schedules.length) { el.innerHTML = ''; return; }
  el.innerHTML = schedules.map(s => `
    <div class="schedule-item">
      <span style="font-size:1.2rem">⏰</span>
      <span style="flex:1;font-size:.85rem">
        <strong>${s.time}</strong> · ${s.lang} · "${s.topic}"
        ${s.webhook ? `<br><span style="font-size:.7rem;color:var(--text2)">${s.webhook.slice(0,50)}…</span>` : ''}
      </span>
      <button class="del secondary" onclick="deleteSchedule('${s.id}')">✕</button>
    </div>`).join('');
}
</script>
