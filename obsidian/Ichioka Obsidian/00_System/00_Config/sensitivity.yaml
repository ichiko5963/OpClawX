# sensitivity.yaml
# 機密判定・マスキング方針
#
# このファイルはデータの機密レベルを判定し、適切にマスキング・フィルタリングするための設定です。

# =============================================================================
# バージョン情報
# =============================================================================
version: "1.0"
updated_at: "2026-02-03"
updated_by: "Pi"

# =============================================================================
# 機密レベル定義
# =============================================================================
# public: 公開可能
# internal: 社内のみ（デフォルト）
# confidential: 機密（関係者のみ）
# restricted: 厳重機密（最小限の関係者のみ）

sensitivity_levels:
  public:
    description: "公開可能な情報"
    retention_days: null  # 無期限
    can_appear_in_digest: true
    can_appear_in_summary: true
    mask_in_logs: false
  
  internal:
    description: "社内向け情報（デフォルト）"
    retention_days: 365
    can_appear_in_digest: true
    can_appear_in_summary: true
    mask_in_logs: false
  
  confidential:
    description: "機密情報（関係者のみ）"
    retention_days: 180
    can_appear_in_digest: true
    can_appear_in_summary: false  # サマリーには含めない
    mask_in_logs: true
  
  restricted:
    description: "厳重機密（最小限の関係者のみ）"
    retention_days: 90
    can_appear_in_digest: false  # ダイジェストに含めない
    can_appear_in_summary: false
    mask_in_logs: true

# =============================================================================
# デフォルト設定
# =============================================================================
defaults:
  # ソース別のデフォルト機密レベル
  by_source:
    gmail: "internal"
    slack: "internal"
    gcal: "internal"
    gdrive: "internal"
  
  # 判定できない場合のデフォルト
  fallback: "internal"

# =============================================================================
# 機密判定ルール
# =============================================================================
# キーワードやパターンに基づいて機密レベルを判定

classification_rules:
  # Restricted（厳重機密）
  restricted:
    keywords:
      - "パスワード"
      - "password"
      - "秘密鍵"
      - "private key"
      - "api key"
      - "apiキー"
      - "secret"
      - "token"
      - "クレジットカード"
      - "credit card"
      - "銀行口座"
      - "bank account"
      - "暗証番号"
      - "pin"
    
    patterns:
      # クレジットカード番号
      - "\\b\\d{4}[- ]?\\d{4}[- ]?\\d{4}[- ]?\\d{4}\\b"
      # API Key っぽい文字列
      - "\\b[a-zA-Z0-9]{32,}\\b"
  
  # Confidential（機密）
  confidential:
    keywords:
      - "契約"
      - "contract"
      - "見積"
      - "quotation"
      - "請求"
      - "invoice"
      - "給与"
      - "salary"
      - "報酬"
      - "compensation"
      - "NDA"
      - "秘密保持"
      - "個人情報"
      - "personal data"
      - "顧客情報"
      - "customer data"
    
    # 特定の送信者からは機密扱い
    sender_domains:
      - "*.bank.co.jp"
      - "*.sec.co.jp"
  
  # Public（公開可能）
  public:
    keywords:
      - "プレスリリース"
      - "press release"
      - "お知らせ"
      - "announcement"
      - "公開"
      - "public"

# =============================================================================
# PII（個人識別情報）検出ルール
# =============================================================================
pii_detection:
  enabled: true
  
  patterns:
    # 電話番号（日本）
    phone_jp:
      pattern: "\\b0\\d{1,4}-?\\d{1,4}-?\\d{4}\\b"
      mask_with: "[電話番号]"
      sensitivity: "confidential"
    
    # メールアドレス
    email:
      pattern: "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"
      mask_with: "[メールアドレス]"
      sensitivity: "internal"
      # 例外: 自分のメールアドレスはマスクしない
      exceptions:
        - "*@aircle.jp"
    
    # 住所（日本）
    address_jp:
      pattern: "(?:東京都|北海道|(?:京都|大阪)府|.{2,3}県).{1,4}[市区町村].+"
      mask_with: "[住所]"
      sensitivity: "confidential"
    
    # マイナンバー
    my_number:
      pattern: "\\b\\d{12}\\b"
      mask_with: "[マイナンバー]"
      sensitivity: "restricted"
    
    # クレジットカード番号
    credit_card:
      pattern: "\\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13})\\b"
      mask_with: "[クレジットカード]"
      sensitivity: "restricted"

# =============================================================================
# マスキング設定
# =============================================================================
masking:
  # マスキングを有効にする場面
  apply_to:
    - logs
    - digests_summary
    - external_sharing
  
  # マスキングしない場面
  skip_for:
    - vault_storage  # Vaultには元データを保存
    - owner_view     # オーナー閲覧時はマスクしない
  
  # マスキング方法
  methods:
    partial:
      # 部分マスク（例: ichiko***@gmail.com）
      email: true
      phone: true
    
    full:
      # 完全マスク（例: [クレジットカード]）
      credit_card: true
      my_number: true
      password: true

# =============================================================================
# データ保持ポリシー
# =============================================================================
retention:
  # 生データ（raw）
  raw:
    gmail: 30       # 30日後に削除
    slack: 30
    gcal: 90        # カレンダーは長めに
    gdrive: 90
  
  # 正規化データ（normalized）
  normalized:
    default: 365    # 1年
    confidential: 180
    restricted: 90
  
  # ダイジェスト
  digests:
    daily: 365      # 1年
    hourly: 30      # 1ヶ月
  
  # ログ
  logs:
    default: 90
    errors: 365     # エラーは長めに

# =============================================================================
# 例外ルール
# =============================================================================
exceptions:
  # 特定のプロジェクトは機密レベルを上げる
  by_project:
    ClientWork: "confidential"
  
  # 特定の人物からのメールは機密扱い
  by_sender:
    # 重要顧客など
    # - "vip@example.com"

# =============================================================================
# 監査ログ
# =============================================================================
audit:
  enabled: true
  log_access_to_restricted: true
  log_masking_operations: true
  log_retention_operations: true
