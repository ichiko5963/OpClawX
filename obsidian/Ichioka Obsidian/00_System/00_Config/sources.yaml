# sources.yaml - 収集対象・頻度・スコープ
# 最終更新: 2026-02-03

version: 1

# グローバル設定
global:
  timezone: Asia/Tokyo
  default_frequency: hourly
  retention_days: 30  # raw データ保持期間

# Gmail
gmail:
  enabled: true
  frequency: hourly
  scope: read_only  # read_only | read_write
  filters:
    # 収集対象
    include:
      - label: INBOX
      - label: SENT
    # 除外
    exclude:
      - label: SPAM
      - label: TRASH
      - from: "noreply@"
      - from: "no-reply@"
  lookback_days: 30  # 初回取得時の遡り日数

# Google Calendar
gcal:
  enabled: true
  frequency: hourly
  scope: read_only
  calendars:
    - primary  # メインカレンダー
  lookback_days: 7
  lookahead_days: 30

# Google Drive
gdrive:
  enabled: true
  frequency: hourly
  scope: read_only
  folders:
    # 監視対象フォルダ（ID or パス）
    - name: "Meet Recordings"
      id: ""  # TODO: フォルダID設定
      auto_transcribe: true
    - name: "領収書"
      id: ""
      auto_transcribe: false
    - name: "契約書"
      id: ""
      auto_transcribe: false
  file_types:
    - application/pdf
    - application/vnd.google-apps.document
    - video/mp4
    - audio/mpeg

# Slack
slack:
  enabled: true
  frequency: hourly
  workspace: "AirCle｜大学生AI団体"
  owner_user_id: "U09B8K99MLK"  # いちさん
  scope:
    - channels:read
    - channels:history
    - groups:read
    - groups:history
    - im:read
    - im:history
    - mpim:read
    - mpim:history
    - users:read
  channels:
    # 監視対象（チャンネル名 or ID）
    include:
      - general
      - random
      # TODO: 追加チャンネル
    include_dms: true
    include_mentions: true
  lookback_days: 14

# Chatwork（無効）
chatwork:
  enabled: false
