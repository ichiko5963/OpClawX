# routing_rules.yaml
# ルーティングルール設定
# 
# このファイルはイベントを適切なプロジェクト、人物、企業に振り分けるためのルールを定義します。
# スクリプトはこのファイルを読み込んで動作します。

# =============================================================================
# バージョン情報
# =============================================================================
version: "1.0"
updated_at: "2026-02-03"
updated_by: "Pi"

# =============================================================================
# プロジェクトルーティング
# =============================================================================
# イベントをプロジェクトに振り分けるルール
# マッチ順: keywords → slack_channels → email_domains → email_patterns

projects:
  AirCle:
    description: "大学生AI団体"
    active: true
    priority: 1  # マッチ優先度（低いほど優先）
    
    keywords:
      - "aircle"
      - "エアクル"
      - "大学生ai"
      - "ai団体"
      - "学生ai"
    
    slack_channels:
      - "1-運営からの連絡"
      - "2-自己紹介"
      - "team-x-japan"
      - "5-大規模イベント"
      - "4-勉強会_交流会"
    
    email_domains:
      - "aircle.jp"
    
    email_patterns:
      - "aircle"
    
    vault_path: "03_Projects/_Active/AirCle"
  
  ClimbBeyond:
    description: "プロジェクト"
    active: true
    priority: 2
    
    keywords:
      - "climbbeyond"
      - "クライムビヨンド"
      - "climb beyond"
      - "climb"
    
    slack_channels: []
    email_domains: []
    email_patterns: []
    
    vault_path: "03_Projects/_Active/ClimbBeyond"
  
  SlideBox:
    description: "プロジェクト"
    active: true
    priority: 3
    
    keywords:
      - "slidebox"
      - "スライドボックス"
      - "slide box"
    
    slack_channels: []
    email_domains: []
    email_patterns: []
    
    vault_path: "03_Projects/_Active/SlideBox"
  
  Genspark:
    description: "協業プロジェクト"
    active: true
    priority: 2
    
    keywords:
      - "genspark"
      - "ゲンスパーク"
    
    slack_channels:
      - "genspark"
    
    email_domains:
      - "genspark.ai"
    
    email_patterns:
      - "genspark"
    
    vault_path: "03_Projects/_Active/Genspark"
  
  ClientWork:
    description: "外部案件・受託"
    active: true
    priority: 10  # 他にマッチしなかった場合
    
    keywords:
      - "クライアント"
      - "案件"
      - "受託"
      - "見積"
      - "請求"
      - "契約"
    
    slack_channels: []
    email_domains: []
    email_patterns: []
    
    vault_path: "03_Projects/_Active/ClientWork"

# =============================================================================
# 人物ルーティング
# =============================================================================
# メールアドレスや名前から人物プロファイルにリンク

people:
  # オーナー（いちさん）
  owner:
    names:
      - "市岡"
      - "いちおか"
      - "直人"
      - "naoto"
      - "ichioka"
    
    emails:
      - "*@aircle.jp"
    
    slack_ids:
      - "U09B8K99MLK"
    
    is_owner: true
  
  # 他のメンバーはここに追加
  # member_name:
  #   names: []
  #   emails: []
  #   slack_ids: []
  #   vault_path: "10_People/名前"

# =============================================================================
# 企業ルーティング
# =============================================================================
# メールドメインから企業プロファイルにリンク

companies:
  # 例: Genspark
  genspark:
    name: "Genspark"
    domains:
      - "genspark.ai"
    keywords:
      - "genspark"
    vault_path: "11_Companies/Genspark"
  
  # 例: ポート株式会社
  port:
    name: "ポート株式会社"
    domains:
      - "port-inc.co.jp"
    keywords:
      - "ポート"
      - "port"
    vault_path: "11_Companies/ポート株式会社"

# =============================================================================
# 優先度ルール
# =============================================================================
# イベントの優先度（P0/P1/P2/P3）を判定するルール

priority_rules:
  # P0: 今日中に対応が必要
  P0:
    keywords:
      - "至急"
      - "緊急"
      - "urgent"
      - "asap"
      - "今日中"
      - "本日中"
      - "deadline"
      - "締め切り"
      - "〆切"
      - "障害"
      - "エラー"
      - "落ちてる"
      - "止まってる"
    
    # 送信者ドメインによる優先
    sender_domains:
      - "genspark.ai"  # 重要顧客
    
    # 件名パターン
    subject_patterns:
      - "^\\[緊急\\]"
      - "^\\[URGENT\\]"
  
  # P1: 24-72h以内に対応
  P1:
    keywords:
      - "重要"
      - "important"
      - "要返信"
      - "確認依頼"
      - "お願い"
      - "ご確認"
      - "ご連絡"
      - "ご相談"
      - "質問"
      - "日程調整"
      - "ミーティング"
      - "打ち合わせ"
      - "面談"
      - "インタビュー"
    
    # 疑問符で終わる
    patterns:
      - "\\?$"
      - "？$"
  
  # P2: 重要だが緊急でない
  P2:
    keywords:
      - "更新"
      - "共有"
      - "報告"
      - "進捗"
      - "連絡"
      - "FYI"
      - "参考"
  
  # P3: 記録のみ（デフォルト）
  P3:
    # 明示的にP3にするパターン
    keywords:
      - "メルマガ"
      - "ニュースレター"
      - "newsletter"
      - "お知らせ"
      - "広告"

# =============================================================================
# 返信不要ルール
# =============================================================================
# これらにマッチしたメールは返信不要と判定

no_reply_rules:
  # 送信者パターン
  sender_patterns:
    - "noreply@"
    - "no-reply@"
    - "donotreply@"
    - "notification@"
    - "alert@"
    - "mailer@"
    - "info@"
    - "news@"
  
  # キーワード
  keywords:
    - "通知"
    - "notification"
    - "自動送信"
    - "automated"
    - "メルマガ"
    - "配信停止"
    - "unsubscribe"
    - "キャンペーン"
    - "セール"
    - "広告"
    - "限定特典"
    - "無料プレゼント"
    - "資料請求"
    - "ご提案物件"
    - "お部屋探し"
    - "物件情報"
    - "認証コード"
    - "verification"
    - "パスワード"
    - "ログイン通知"
  
  # 件名パターン
  subject_patterns:
    - "^\\[PR\\]"
    - "^【PR】"
    - "^（PR）"
    - "^\\[広告\\]"

# =============================================================================
# アクション必要ルール
# =============================================================================
# これらにマッチしたイベントは action_required = true

action_required_rules:
  keywords:
    - "ご確認.*お願い"
    - "ご返信.*お願い"
    - "お返事"
    - "ご回答"
    - "ご連絡.*ください"
    - "いかがでしょうか"
    - "ご都合"
    - "確認させて"
    - "教えて"
  
  # いちさん宛て
  mentions_owner: true
