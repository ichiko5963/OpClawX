name: Daily Post Generation

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日朝7時JST (22:00 UTC)
  workflow_dispatch:

jobs:
  generate-bookmarks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate drafts from bookmarks
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "${{ secrets.VERCEL_URL || 'http://localhost:3000' }}/api/generate-drafts" \
            -H "Content-Type: application/json" \
            -d '{"type": "bookmarks", "limit": 60}' \
            --fail || echo "API call failed, but continuing"

      - name: Save drafts artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookmark-drafts
          path: public/data/drafts.json
          if-no-files-found: ignore

  generate-keywords:
    runs-on: ubuntu-latest
    needs: generate-bookmarks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate drafts from keywords
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "${{ secrets.VERCEL_URL || 'http://localhost:3000' }}/api/generate-drafts" \
            -H "Content-Type: application/json" \
            -d '{"type": "keywords", "minLikes": 500}' \
            --fail || echo "API call failed, but continuing"

      - name: Save drafts artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyword-drafts
          path: public/data/drafts.json
          if-no-files-found: ignore

      - name: Notify completion
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{"content":"📝 日次投稿案生成が完了しました！\nダッシュボードで確認してください: ${{ secrets.VERCEL_URL || 'http://localhost:3000' }}"}' \
              --fail || true
          fi
