name: Account Monitoring

on:
  schedule:
    - cron: '*/15 * * * *'  # 15分ごと
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download previous state
        uses: actions/download-artifact@v4
        with:
          name: monitoring-state
          path: .
        continue-on-error: true

      - name: Monitor accounts
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/monitor-accounts.js

      - name: Save state
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-state
          path: .monitor-state.json
          if-no-files-found: ignore

      - name: Update drafts
        if: success()
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
        run: |
          # Sync drafts to Vercel if URL is available
          if [ -n "$VERCEL_URL" ] && [ -f "public/data/drafts.json" ]; then
            echo "Drafts generated/updated"
            ls -la public/data/
          fi
