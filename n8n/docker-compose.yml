# n8n Docker Compose Configuration
# 最終更新: 2026-02-03

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - TZ=Asia/Tokyo
      - GENERIC_TIMEZONE=Asia/Tokyo
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=ContextCurator2026!
      - N8N_ENCRYPTION_KEY=effdc06a2c03977ec7f117f4e3f0841fb3f5817e18ba096b973b0fd6115c9ceb
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_LOG_LEVEL=info
      - EXECUTIONS_MODE=regular
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
    volumes:
      - n8n_data:/home/node/.n8n
      # ローカルフォルダにマウント（iCloud外）
      - /Users/ai-driven-work/n8n-data/vault:/vault:rw

volumes:
  n8n_data:
    driver: local
