name: Google Data Sync (Hourly)

on:
  schedule:
    # 毎時実行
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      initial_sync:
        description: '初回同期（1ヶ月分取得）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2
          pip install google-api-python-client requests
      
      - name: Setup Google OAuth tokens
        run: |
          mkdir -p /tmp
          echo '${{ secrets.GOOGLE_OAUTH_TOKENS }}' > /tmp/google_oauth_tokens.json
      
      - name: Sync Google Data
        env:
          INITIAL_SYNC: ${{ github.event.inputs.initial_sync }}
        run: |
          python3 scripts/sync_google_data.py
      
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Google Data Sync: $(date +'%Y-%m-%d %H:%M JST')"
            git push
          fi
