name: Daily Post Generation

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run due schedules
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: node scheduler/daily.js --run-due
