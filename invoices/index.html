<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>請求書一覧</title>
    <style>
        body { font-family: "Yu Gothic", "Meiryo", sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; letter-spacing: 8px; }
        .invoice-list { list-style: none; }
        .invoice-item { border: 2px solid #333; margin-bottom: 15px; }
        .invoice-item a { display: block; padding: 20px; text-decoration: none; color: #333; }
        .invoice-item a:hover { background: #f5f5f5; }
        .invoice-header { display: flex; justify-content: space-between; }
        .invoice-no { font-weight: bold; }
        .invoice-date { color: #666; }
        .invoice-company { font-weight: bold; margin-top: 5px; }
        .invoice-title { color: #333; margin-top: 3px; }
        .invoice-amount { font-weight: bold; color: #c00; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>請求書一覧</h1>
    <ul class="invoice-list">
        <li class="invoice-item">
            <a href="/02.html">
                <div class="invoice-header">
                    <span class="invoice-no">No.02</span>
                    <span class="invoice-date">2026年02月21日</span>
                </div>
                <div class="invoice-company">ポート株式会社</div>
                <div class="invoice-title">Xプレミアム2月分</div>
                <div class="invoice-amount">¥1,648-</div>
            </a>
        </li>
        <li class="invoice-item">
            <a href="/01.html">
                <div class="invoice-header">
                    <span class="invoice-no">No.01</span>
                    <span class="invoice-date">2026年02月21日</span>
                </div>
                <div class="invoice-company">Genspark</div>
                <div class="invoice-title">SNSコンサルティング</div>
                <div class="invoice-amount">¥225,000-</div>
            </a>
        </li>
    </ul>
</body>
</html>
