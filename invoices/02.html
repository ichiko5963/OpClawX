<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>請求書 - 02</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @page { size: A4 landscape; margin: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Yu Gothic", "Meiryo", "Hiragino Sans", sans-serif;
            font-size: 9pt;
            line-height: 1.3;
            color: #333;
            width: 297mm;
            height: 210mm;
            margin: 0;
            padding: 5mm;
            overflow: hidden;
            background: #fff;
        }
        
        .action-bar { 
            position: fixed; 
            top: 5px; 
            right: 5px; 
            z-index: 1000; 
            display: flex; 
            gap: 5px; 
        }
        .action-btn { 
            padding: 5px 10px; 
            font-size: 9pt; 
            cursor: pointer; 
            border: 1px solid #333; 
            background: #fff; 
            color: #333; 
        }
        .action-btn:hover { background: #333; color: #fff; }
        .action-btn.pdf { background: #c00; color: #fff; border-color: #c00; }
        .action-btn.copy { background: #0066cc; color: #fff; border-color: #0066cc; }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 3mm; 
            border-bottom: 2px solid #333; 
            padding-bottom: 3mm; 
        }
        .header-left h1 { font-size: 16pt; letter-spacing: 4px; font-weight: bold; }
        
        .invoice-info { display: flex; justify-content: space-between; margin-bottom: 3mm; }
        .info-box { width: 45%; }
        .info-row { display: flex; border-bottom: 1px solid #ddd; padding: 1px 0; }
        .info-label { width: 20mm; color: #666; font-size: 8pt; }
        .info-value { font-weight: bold; font-size: 8pt; }
        
        .to { margin-bottom: 3mm; padding: 2mm; border: 1px solid #333; }
        .to-label { font-size: 7pt; color: #666; }
        .to-name { font-size: 10pt; font-weight: bold; }
        
        .subject { 
            margin-bottom: 3mm; 
            padding: 2mm; 
            background: #f8f8f8; 
            border-left: 2px solid #333; 
            font-size: 8pt;
        }
        
        .amount-box { 
            text-align: right; 
            margin-bottom: 3mm; 
            padding: 2mm; 
            background: #fff; 
            border: 1px solid #333; 
        }
        .amount-label { font-size: 9pt; }
        .amount-value { font-size: 14pt; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 3mm; font-size: 8pt; }
        th, td { border: 1px solid #333; padding: 2mm 1mm; }
        th { background: #333; color: #fff; font-size: 7pt; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        
        .summary { display: flex; justify-content: flex-end; margin-bottom: 3mm; }
        .summary-table { width: 35mm; }
        .summary-table td { border: none; padding: 1px 2px; }
        .summary-label { text-align: right; color: #666; font-size: 8pt; }
        .summary-value { text-align: right; font-weight: bold; font-size: 8pt; }
        .total-row { border-top: 2px solid #333 !important; font-size: 10pt; }
        
        .bottom-row { display: flex; justify-content: space-between; }
        
        .issuer { width: 48%; margin-bottom: 2mm; padding: 2mm; border: 1px solid #333; font-size: 7pt; }
        .issuer-title { font-size: 6pt; color: #666; margin-bottom: 1px; }
        .issuer-name { font-size: 9pt; font-weight: bold; margin-bottom: 1px; }
        
        .bank { width: 48%; margin-bottom: 2mm; padding: 2mm; background: #fafafa; border: 1px solid #ccc; font-size: 7pt; }
        .bank-title { font-size: 6pt; color: #666; margin-bottom: 1px; }
        .bank-name { font-size: 8pt; font-weight: bold; }
        
        .footer { 
            text-align: center; 
            color: #888; 
            font-size: 6pt; 
            padding-top: 2mm; 
            border-top: 1px solid #ddd; 
        }
        
        .back-link { display: none; }
        .share-link { display: none; }
        
        .toast { 
            position: fixed; 
            bottom: 10px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #333; 
            color: #fff; 
            padding: 5px 10px; 
            display: none; 
            z-index: 2000; 
            font-size: 8pt;
        }
    </style>
</head>
<body>
    <!-- 保存ボタン -->
    <div class="action-bar">
        <button class="action-btn copy" onclick="copyLink()">共有</button>
        <button class="action-btn pdf" onclick="downloadPDF()">PDF</button>
    </div>
    
    <!-- 共有リンク -->
    <div class="share-link">
        <input type="text" id="shareUrl" value="https://invoices-henna.vercel.app/02.html" readonly>
    </div>
    
    <a href="/" class="back-link">← 一覧</a>
    
    <div class="header">
        <div class="header-left"><h1>請 求 書</h1></div>
    </div>
    
    <div class="invoice-info">
        <div class="info-box">
            <div class="info-row"><span class="info-label">日付：</span><span class="info-value">2026年02月21日</span></div>
        </div>
        <div class="info-box" style="text-align: right;">
            <div class="info-row" style="justify-content: flex-end;"><span class="info-label">№：</span><span class="info-value">02</span></div>
        </div>
    </div>
    
    <div class="to">
        <div class="to-label">請求先</div>
        <div class="to-name">ポート株式会社</div>
    </div>
    
    <div class="subject">
        件名：Xプレミアム2月分<br>
        、下記のとおりご請求申し上げます。
    </div>
    
    <div class="amount-box">
        <div class="amount-label">ご請求金額</div>
        <div class="amount-value">¥ 1,648-</div>
    </div>
    
    <table>
        <thead>
            <tr>
                <th style="width: 55%;">品名</th>
                <th style="width: 15%; text-align: center;">数量</th>
                <th style="width: 15%; text-align: right;">単価</th>
                <th style="width: 15%; text-align: right;">金額</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Xプレミアム(999円)</td>
                <td class="text-center">1</td>
                <td class="text-right">999</td>
                <td class="text-right">999</td>
            </tr>
            <tr>
                <td>Xプレミアム(499円)</td>
                <td class="text-center">1</td>
                <td class="text-right">499</td>
                <td class="text-right">499</td>
            </tr>
        </tbody>
    </table>
    
    <div class="summary">
        <table class="summary-table">
            <tr><td class="summary-label">小計：</td><td class="summary-value">1,498</td></tr>
            <tr><td class="summary-label">税(10%)：</td><td class="summary-value">150</td></tr>
            <tr class="total-row"><td class="summary-label">合計：</td><td class="summary-value">1,648</td></tr>
        </table>
    </div>
    
    <div class="bottom-row">
        <div class="issuer">
            <div class="issuer-title">請求者</div>
            <div class="issuer-name">市岡直人</div>
            <div>TEL:080-3896-7229</div>
        </div>
        
        <div class="bank">
            <div class="bank-title">振込先</div>
            <div class="bank-name">西日本シティ銀行 周船寺支行</div>
            <div>イチオカナオト（普通）3124131</div>
        </div>
    </div>
    
    <div class="footer">
        ※振込手数料はお客様負担 ※ご不明な点はお気軽に問い合わせください
    </div>
    
    <div class="toast" id="toast">コピーしました！</div>
    
    <script>
    function copyLink() {
        const url = document.getElementById('shareUrl').value;
        navigator.clipboard.writeText(url).then(function() {
            const toast = document.getElementById('toast');
            toast.textContent = 'コピーしました！';
            toast.style.display = 'block';
            setTimeout(function() { toast.style.display = 'none'; }, 2000);
        });
    }
    
    function downloadPDF() {
        // PDF出力時はアクションラッパーを非表示
        document.querySelector('.action-bar').style.display = 'none';
        
        const element = document.body;
        
        const opt = {
            filename: '請求書-02-ポート.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { 
                scale: 2,
                useCORS: true,
                logging: false
            },
            jsPDF: {
                unit: 'pt',
                format: [842, 595],
                orientation: 'landscape'
            },
            margin: 0
        };
        
        const btn = document.querySelector('.action-btn.pdf');
        btn.textContent = '生成中...';
        
        html2pdf().set(opt).from(element).save().then(function() {
            btn.textContent = 'PDF';
            document.querySelector('.action-bar').style.display = 'flex';
            const toast = document.getElementById('toast');
            toast.textContent = 'DL完了！';
            toast.style.display = 'block';
            setTimeout(function() { toast.style.display = 'none'; }, 2000);
        }).catch(function(err) {
            btn.textContent = 'PDF';
            document.querySelector('.action-bar').style.display = 'flex';
        });
    }
    </script>
</body>
</html>
